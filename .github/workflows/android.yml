name: Build Android APK

# Builds a playable debug APK in a clean CI environment.
#  • on a version tag (v*)  -> builds AND attaches the APK to that GitHub Release
#  • manual (Run workflow)  -> builds and uploads the APK as a downloadable artifact
#  • push to main           -> builds the APK as an artifact (smoke test)
on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3-stable      # must match the editor that made the project
  TEMPLATE_DIR: 4.6.3.stable

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # needed to attach the APK to a release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "build-tools;35.0.0"

      - name: Download Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -e
          base="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          curl -L -o godot.zip "${base}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -L -o templates.tpz "${base}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${TEMPLATE_DIR}"
          mv templates/* "$HOME/.local/share/godot/export_templates/${TEMPLATE_DIR}/"

      - name: Create debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android \
            -keystore "$PWD/debug.keystore" -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      - name: Import project
        run: godot --headless --import || true

      # Written AFTER import so the import pass can't rewrite/strip these keys before export.
      - name: Configure Godot editor settings (SDK / JDK / keystore)
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${PWD}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export debug APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/Astryx.apk
          ls -lh build/Astryx.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astryx-Android
          path: build/Astryx.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Astryx.apk
