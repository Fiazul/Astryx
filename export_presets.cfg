; Godot export presets for Astryx v0.2.0
; Windows Desktop (x86_64 .exe) and Linux/X11 (x86_64 binary)

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/windows/Astryx.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc=true
texture_format/etc2=false
texture_format/etc=false
binary_format/architecture="x86_64"
codesign/enable=false
codesign/timestamp=true
codesign/timestamp_server_url=""
codesign/digest_algorithm=1
codesign/description=""
codesign/custom_options=PackedStringArray()
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/modify_resources=true
application/company_name=""
application/product_name="Astryx"
application/file_description="Astryx - Space Exploration Game"
application/copyright="2025 Astryx"
application/trademarks=""
application/export_angle=0
application/export_d3d12=0
application/d3d12_agility_sdk_multiarch=true
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="Expand-Archive -LiteralPath '{temp_dir}\\{archive_name}' -DestinationPath '{temp_dir}';`n$action = New-ScheduledTaskAction -Execute '{temp_dir}\\{exe_name}' -Argument '{cmd_args}';`n$trigger = New-ScheduledTaskTrigger -Once -At 00:00;`n$settings = New-ScheduledTaskSettingsSet;`n$task = New-ScheduledTask -Action $action -Trigger $trigger -Settings $settings;`nRegister-ScheduledTask godot_remote_debug -InputObject $task -Force;`nStart-ScheduledTask godot_remote_debug"
ssh_remote_deploy/cleanup_script="Stop-ScheduledTask -TaskName godot_remote_debug -ErrorAction SilentlyContinue;`nUnregister-ScheduledTask -TaskName godot_remote_debug -Confirm:$false -ErrorAction SilentlyContinue;`nRemove-Item -Recurse -Force '{temp_dir}'"

[preset.1]

name="Linux/X11"
platform="Linux/X11"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/linux/Astryx.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.1.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc=true
texture_format/etc2=false
texture_format/etc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="export DISPLAY=:0\nexport WAYLAND_DISPLAY=wayland-0\n'{execute_path}' {cmd_args}"
ssh_remote_deploy/cleanup_script="kill $(pgrep -a godot | awk '{print $1}')\nrm -rf '{temp_dir}'"
